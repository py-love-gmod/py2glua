module: api/gmod_api.py

imports:
  - from collections.abc import Callable
  - from typing import TypeVar
  - from py2glua.glua import nil, nil_type
  - from py2glua.glua.core import CompilerDirective
  - from py2glua.glua.realm import Realm

type_vars:
  - name: F
    bound: Callable[..., object]

functions:
  - name: is_valid
    args:
      - name: value
        type: object
    returns: bool
    body: pass
    decorators:
      - kind: gmod_api
        name: IsValid
        realms: [SHARED]
        method: false

  - name: include
    args:
      - name: path
        type: str
    body: ellipsis
    decorators:
      - kind: gmod_api
        name: include
        realms: [SHARED]
        method: false

classes:
  - name: "ExampleEntity"
    bases: ["BaseEntity"]
    decorators:
      - kind: raw
        expr: "CompilerDirective.with_condition()"
    fields:
      - name: "health"
        type: "int"
        value: 100
      - name: "model_path"
        type: "str"
        value: "models/example.mdl"
    methods:
      - name: "set_health"
        args:
          - name: "self"
            type: "ExampleEntity"
          - name: "value"
            type: "int"
        returns: "None"
        body: "pass"
      - name: "debug_ping"
        args:
          - name: "self"
            type: "ExampleEntity"
          - name: "prefix"
            type: "str"
            kind: "kwonly"
            default: "ping"
        returns: "str"
        body: "pass"
    classes:
      - name: "Meta"
        fields:
          - name: "version"
            type: "int"
            value: 1
        methods:
          - name: "is_stable"
            returns: "bool"
            body: "pass"

  - name: "TypeShowcase"
    fields:
      - name: "payload"
        type: "dict[str, list[CustomType | None]]"
    methods:
      - name: "set_payload"
        args:
          - name: "self"
            type: "TypeShowcase"
          - name: "payload"
            type: "dict[str, list[CustomType | None]]"
        returns: "None"
        body: "pass"

  - name: "SWEP"
    decorators:
      - kind: raw
        expr: 'CompilerDirective.gmod_prototype("weapons")'
    fields:
      - name: "uid"
        type: "str | nil_type"
      - name: "Base"
        type: "str"
      - name: "Spawnable"
        type: "bool"
        value: true
      - name: "AdminOnly"
        type: "bool"
        value: false
    methods:
      - name: "override"
        decorators:
          - kind: raw
            expr: "staticmethod"
        args:
          - name: "realm"
            type: "CompilerDirective.RealmMarker"
          - name: "target"
            type: "Callable[[F], F]"
        returns: "Callable[[Callable[[F], F]], Callable[[F], F]]"
        body: "decorator"
      - name: "add_method"
        decorators:
          - kind: raw
            expr: "staticmethod"
        args:
          - name: "realm"
            type: "CompilerDirective.RealmMarker"
        returns: "Callable"
        body: "decorator"
      - name: "Initialize"
        args:
          - name: "self"
            type: "SWEP"
        returns: "nil_type"
        body: "pass"
      - name: "PrimaryAttack"
        args:
          - name: "self"
            type: "SWEP"
        returns: "nil_type"
        body: "raw"
        body_lines:
          - "return nil"
    ifs:
      - condition: "Realm.CLIENT"
        fields:
          - name: "Category"
            type: "str"
            value: "PLG SWEP"
          - name: "PrintName"
            type: "str"
            value: "Base SPF PLG SWEP"
        methods:
          - name: "ViewModelDrawn"
            args:
              - name: "self"
                type: "SWEP"
              - name: "ViewModel"
                type: "Entity"
              - name: "flags"
                type: "int"
            returns: "nil_type"
            body: "pass"
